<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">ATP App Tech Stack Diagram</title>
  <desc id="desc">Layered diagram showing frontend, backend API, data and machine learning, and deployment and operations for the ATP season prediction app.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7fbfe"/>
      <stop offset="100%" stop-color="#e7eef5"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00558b"/>
      <stop offset="55%" stop-color="#1a7a8c"/>
      <stop offset="100%" stop-color="#c99a2d"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0c1a2b" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="760" fill="url(#bg)"/>
  <rect x="80" y="40" width="1040" height="8" rx="4" fill="url(#bar)"/>

  <text x="80" y="94" font-family="Manrope, Arial, sans-serif" font-size="40" font-weight="700" fill="#0c1a2b">ATP Season Prediction App · End-to-End Stack</text>
  <text x="80" y="126" font-family="Manrope, Arial, sans-serif" font-size="22" fill="#516173">Data pipeline to live deployment for family and friends league engagement</text>

  <g filter="url(#shadow)">
    <rect x="80" y="170" width="1040" height="120" rx="22" fill="#ffffff" stroke="#d5e2ec"/>
    <rect x="80" y="310" width="1040" height="120" rx="22" fill="#ffffff" stroke="#d5e2ec"/>
    <rect x="80" y="450" width="1040" height="120" rx="22" fill="#ffffff" stroke="#d5e2ec"/>
    <rect x="80" y="590" width="1040" height="120" rx="22" fill="#ffffff" stroke="#d5e2ec"/>
  </g>

  <rect x="96" y="184" width="220" height="92" rx="16" fill="#e8f2fa" stroke="#b8d6eb"/>
  <text x="114" y="216" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#00558b">Experience Layer</text>
  <text x="114" y="244" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">Jinja2 templates</text>
  <text x="114" y="266" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">JavaScript interactions</text>

  <rect x="340" y="184" width="250" height="92" rx="16" fill="#e8f2fa" stroke="#b8d6eb"/>
  <text x="358" y="216" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#00558b">API Layer</text>
  <text x="358" y="244" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">FastAPI routes</text>
  <text x="358" y="266" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">Auth + league workflows</text>

  <rect x="614" y="184" width="238" height="92" rx="16" fill="#e8f2fa" stroke="#b8d6eb"/>
  <text x="632" y="216" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#00558b">Data Layer</text>
  <text x="632" y="244" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">PostgreSQL / Supabase</text>
  <text x="632" y="266" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#24435f">SQLAlchemy + SQL</text>

  <rect x="876" y="184" width="228" height="92" rx="16" fill="#fff4dd" stroke="#e8d2a0"/>
  <text x="894" y="216" font-family="Manrope, Arial, sans-serif" font-size="18" font-weight="700" fill="#8a6518">ML Layer</text>
  <text x="894" y="244" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#5b4a28">XGBoost + sklearn</text>
  <text x="894" y="266" font-family="Manrope, Arial, sans-serif" font-size="16" fill="#5b4a28">Monte Carlo simulation</text>

  <text x="110" y="352" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700" fill="#0c1a2b">1. Ingest and prepare ATP match history</text>
  <text x="110" y="384" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#44576d">Pipeline updates Elo, head-to-head context, event records, and runtime player state.</text>

  <text x="110" y="492" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700" fill="#0c1a2b">2. Train artifacts and serve fast runtime predictions</text>
  <text x="110" y="524" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#44576d">Model artifacts are generated offline and loaded in production for low-latency odds and matchup APIs.</text>

  <text x="110" y="632" font-family="Manrope, Arial, sans-serif" font-size="24" font-weight="700" fill="#0c1a2b">3. Deploy as a live social product</text>
  <text x="110" y="664" font-family="Manrope, Arial, sans-serif" font-size="18" fill="#44576d">Google Cloud Compute Engine + Uvicorn/Gunicorn + Nginx + systemd power the live app for family and friends.</text>
</svg>
